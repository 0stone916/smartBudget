spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smartbudget?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&rewriteBatchedStatements=true
    username: root
    password: 3152

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  
  data:
    redis:
      host: localhost
      port: 6379

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always


logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.http.converter: DEBUG


mybatis:
  mapper-locations: classpath*:mappers/*.xml
  type-aliases-package: com.jys.smartbudget.dto
  configuration:
    map-underscore-to-camel-case: true

jwt:
  # 환경변수에서 읽음, 없으면 JwtKeyConfig에서 에러발생
  secret: ${JWT_SECRET}

kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: smartbudget-group # 그룹명을 서비스 정체성에 맞게 변경
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest


